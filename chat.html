<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Complex Technical Manual QA System</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --bg:       #0b0e14;
    --surface:  #13181f;
    --border:   #1e2530;
    --accent:   #3b82f6;
    --accent2:  #0ea5e9;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --user-bg:  #1e3a5f;
    --cite-bg:  #0f2235;
    --cite-bdr: #1e4a7a;
    --success:  #22c55e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .logo {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .header-text h1 { font-size: 14px; font-weight: 600; }
  .header-text p  { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
  .status-dot {
    margin-left: auto;
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); transition: background 0.3s;
  }
  .dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
  .dot.error  { background: #ef4444; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .welcome {
    margin: auto;
    text-align: center;
    max-width: 380px;
    padding: 40px 20px;
  }
  .welcome .icon { font-size: 38px; margin-bottom: 14px; }
  .welcome h2   { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .welcome p    { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 820px;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; } }

  .msg.user { align-self: flex-end; }
  .msg.bot  { align-self: flex-start; width: 100%; }

  .bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.7;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
    color: #bfdbfe;
    max-width: 580px;
  }
  .msg.bot .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .citations { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
  .citations-label {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 3px;
  }
  .citation-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--cite-bg);
    border: 1px solid var(--cite-bdr);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: #7dd3fc;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .citation-item:hover {
    border-color: var(--accent2);
    background: #13304b;
  }
  .cite-type {
    background: rgba(14,165,233,0.15);
    color: var(--accent2);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
  }

  .meta-row {
    display: flex; gap: 14px;
    margin-top: 7px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
  }

  .thinking .bubble {
    display: flex; align-items: center; gap: 10px;
    color: var(--muted); font-size: 13px; border-style: dashed;
  }
  .dots { display: flex; gap: 4px; }
  .dots span {
    width: 5px; height: 5px;
    background: var(--accent); border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform:translateY(0); opacity:0.4; }
    40%          { transform:translateY(-5px); opacity:1; }
  }

  .error-bubble {
    background: rgba(239,68,68,0.08);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #fca5a5;
  }

  .input-area {
    padding: 14px 20px 18px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .input-row {
    display: flex; gap: 10px; align-items: flex-end;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    transition: border-color 0.2s;
  }
  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(59,130,246,0.12);
  }
  #query-input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px; resize: none;
    min-height: 22px; max-height: 120px; line-height: 1.5;
  }
  #query-input::placeholder { color: var(--muted); }

  #send-btn {
    background: var(--accent); border: none; border-radius: 8px;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  #send-btn:hover   { background: var(--accent2); transform: scale(1.05); }
  #send-btn:active  { transform: scale(0.97); }
  #send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  #send-btn svg { width:16px; height:16px; fill:white; }

  .hint {
    text-align: center; font-size: 10px; color: var(--muted);
    margin-top: 8px; font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>

<header>
  <div class="logo">🛸</div>
  <div class="header-text">
    <h1>Complex Technical Manual QA System</h1>
    <p>NASA SE Handbook · SP-2016-6105 Rev2 · 297 pages · GPT-4o-mini</p>
  </div>
  <div class="status-dot">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">checking...</span>
  </div>
</header>

<div id="messages">
  <div class="welcome" id="welcome">
    <div class="icon">🚀</div>
    <h2>Ask anything about the NASA SE Handbook</h2>
    <p>Answers come directly from the document with citations showing the exact page and section number.</p>
  </div>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="query-input"
      placeholder="Ask a question about NASA systems engineering..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendQuery()" title="Send (Enter)">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
    function copyToClipboard(text, el) {
        navigator.clipboard.writeText(text)
            .then(() => {
                // Brief visual feedback
                if (el) {
                  const prev = el.style.borderColor;
                  el.style.borderColor = 'var(--success)';
                  setTimeout(() => { el.style.borderColor = prev; }, 1000);
                }
            });
    }
  function openCitation(pageNum) {
    if (!pageNum) return;
    window.open(`${API}/page/${pageNum}`, '_blank', 'noopener,noreferrer');
  }
  const API = 'http://localhost:8000';
  let isLoading = false;

  async function checkHealth() {
    try {
      const r = await fetch(`${API}/health`, { signal: AbortSignal.timeout(3000) });
      const data = await r.json();
      if (data.status === 'ready') {
        setStatus('online', `${data.vectors_loaded} vectors · ${data.references_loaded} refs`);
      } else {
        setStatus('error', 'pipeline not loaded');
      }
    } catch {
      setStatus('error', 'server offline');
    }
  }

  function setStatus(state, text) {
    document.getElementById('status-dot').className = 'dot ' + state;
    document.getElementById('status-text').textContent = text;
  }

  async function sendQuery() {
    const input = document.getElementById('query-input');
    const question = input.value.trim();
    if (!question || isLoading) return;

    isLoading = true;
    document.getElementById('send-btn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    appendMsg('user', question);
    const thinkingId = 'thinking-' + Date.now();
    appendThinking(thinkingId);

    try {
      const res = await fetch(`${API}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, region: 'global', top_k: 5 })
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || `HTTP ${res.status}`);
      }
      const data = await res.json();
      removeThinking(thinkingId);
      appendBotMessage(data);
    } catch (err) {
      removeThinking(thinkingId);
      appendError(err.message);
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  function appendMsg(role, text) {
    const el = document.createElement('div');
    el.className = `msg ${role}`;
    el.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
    msgs().appendChild(el);
    scrollDown();
  }

  function appendBotMessage(data) {
    const el = document.createElement('div');
    el.className = 'msg bot';

    const answerHtml = escHtml(data.answer).replace(
      /\[SOURCE\s*(\d+)\]/g,
      '<sup style="color:var(--accent2);font-size:10px;font-weight:600">[S$1]</sup>'
    );

    let citHtml = '';
    if (data.citations && data.citations.length > 0) {
        const items = data.citations.map(c => {
        const pageMatch = c.citation.match(/Page (\d+)/);
        const pageNum = pageMatch ? pageMatch[1] : null;
        const pdfUrl = pageNum
            ? `http://localhost:8000/page/${pageNum}`
            : '#';
        return `<div class="citation-item"
                    onclick="openCitation(${pageNum || 'null'})"
                    title="${pageNum ? `Open PDF page ${pageNum}` : 'No page number found'}">
            <span class="cite-type">${escHtml(c.chunk_type)}</span>
            <span>${escHtml(c.citation)}</span>
            <span style="margin-left:auto;font-size:9px;color:var(--muted)">
              ${pageNum ? `🔗 p.${pageNum}` : ''}
            </span>
            <span
              style="font-size:11px;color:var(--muted);padding-left:6px"
              title="Copy citation text"
              onclick="event.stopPropagation(); copyToClipboard('${escHtml(c.citation)}', this.parentElement)">
              📋
            </span>
        </div>`;
    }).join('');
      citHtml = `<div class="citations">
        <div class="citations-label">Sources</div>${items}
      </div>`;
    }

    const metaHtml = `<div class="meta-row">
      <span>⏱ ${data.latency_seconds}s</span>
      <span>🔤 ${data.tokens_used} tokens</span>
      <span>💵 $${data.estimated_cost_usd}</span>
      <span>🤖 ${data.model}</span>
    </div>`;

    el.innerHTML = `<div class="bubble">${answerHtml}</div>${citHtml}${metaHtml}`;
    msgs().appendChild(el);
    scrollDown();
  }

  function appendThinking(id) {
    const el = document.createElement('div');
    el.className = 'msg bot thinking';
    el.id = id;
    el.innerHTML = `<div class="bubble">
      <div class="dots"><span></span><span></span><span></span></div>
      Searching handbook...
    </div>`;
    msgs().appendChild(el);
    scrollDown();
  }

  function appendError(msg) {
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.innerHTML = `<div class="error-bubble">⚠ ${escHtml(msg)}<br>
      <span style="font-size:11px;color:#94a3b8;display:block;margin-top:4px">
        From src/: uvicorn main:app --reload --port 8000
      </span></div>`;
    msgs().appendChild(el);
    scrollDown();
  }

  function removeThinking(id) {
    const el = document.getElementById(id);
    if (el) el.remove();
  }

  function msgs()      { return document.getElementById('messages'); }
  function scrollDown(){ const m = msgs(); m.scrollTop = m.scrollHeight; }
  function escHtml(s)  {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
      .replace(/\n/g,'<br>');
  }
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuery(); }
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  checkHealth();
  setInterval(checkHealth, 30000);
  document.getElementById('query-input').focus();
</script>
</body>
</html>
